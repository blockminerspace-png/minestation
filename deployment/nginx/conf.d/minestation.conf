server {
    listen 80;
    listen [::]:80;
    server_name genesisdao.tech www.genesisdao.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /etc/nginx/conf.d/sensitive-deny.inc;

    location / {
        return 301 https://genesisdao.tech$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name genesisdao.tech www.genesisdao.tech;

    # Origem só atrás da Cloudflare: copiar snippets para /etc/nginx/ e descomentar.
    # include /etc/nginx/snippets/cloudflare-allow.inc;

    ssl_certificate /etc/letsencrypt/live/genesisdao.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/genesisdao.tech/privkey.pem;

    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    include /etc/nginx/conf.d/sensitive-deny.inc;

    location = /favicon.ico {
        return 204;
    }

    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Genesis DAO em manutenção</title><style>html,body{margin:0;height:100%;background:#0f172a;color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}body{display:flex;align-items:center;justify-content:center;padding:24px}.card{max-width:720px;width:100%;background:linear-gradient(180deg,#111827 0%,#0b1220 100%);border:1px solid rgba(245,158,11,.35);border-radius:20px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.45)}.eyebrow{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(245,158,11,.14);color:#fbbf24;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}h1{margin:18px 0 12px;font-size:clamp(32px,6vw,56px);line-height:1.02}p{margin:0 0 14px;font-size:18px;line-height:1.6;color:#cbd5e1}.muted{color:#94a3b8;font-size:15px}.brand{margin-top:24px;font-weight:700;color:#f59e0b}</style></head><body><main class="card"><span class="eyebrow">Aviso de manutenção</span><h1>Genesis DAO temporariamente em manutenção</h1><p>Estamos realizando ajustes na infraestrutura para estabilizar a plataforma.</p><p>O acesso público será restabelecido assim que a manutenção for concluída com segurança.</p><p class="muted">Se você já tinha cadastro, os dados da plataforma estão sendo preservados durante este procedimento.</p><div class="brand">Genesis DAO</div></main></body></html>';
    }
}
