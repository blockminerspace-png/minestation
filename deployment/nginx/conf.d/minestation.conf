server {
    listen 80;
    listen [::]:80;
    server_name test.genesisdao.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /etc/nginx/conf.d/sensitive-deny.inc;

    location / {
        return 301 https://test.genesisdao.tech$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name test.genesisdao.tech;

    ssl_certificate /etc/letsencrypt/live/test.genesisdao.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.genesisdao.tech/privkey.pem;

    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    include /etc/nginx/conf.d/sensitive-deny.inc;

    # WebSockets à parte: timeouts longos e Connection upgrade só aqui (evita 502/522 no REST por header errado).
    location ^~ /ws/ {
        limit_req zone=perip burst=200 nodelay;
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=perip burst=200 nodelay;
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
