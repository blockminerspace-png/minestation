services:
  local-db:
    image: postgres:16-alpine
    container_name: minestation-local-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: minestation
    volumes:
      - minestation_local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minestation"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  minestation_local_pgdata:
