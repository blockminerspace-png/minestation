<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JBHPLPLLDG"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-JBHPLPLLDG');
    </script>
    <title>Login - Genesis Miner Admin</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: #252526;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #333;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        h1 { margin-bottom: 2rem; font-size: 1.5rem; color: #fff; }
        .btn-login {
            background-color: #f57c00; /* Orange/Gold style */
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-login:hover { background-color: #e65100; }
        .btn-login:disabled { background-color: #555; cursor: not-allowed; }
        .error-msg {
            color: #f44336;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .icon-wallet {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>Genesis Miner Admin</h1>
    <p style="color: #aaa; margin-bottom: 2rem;">Conecte sua carteira para acessar</p>
    
    <button id="btnLogin" class="btn-login">
        <svg class="icon-wallet" viewBox="0 0 24 24">
            <path d="M21 18V19C21 20.1 20.1 21 19 21H5C3.89 21 3 20.1 3 19V5C3 3.9 2.1 3 1 3H0V1H1C3.21 1 5 2.79 5 5V18H19C19.55 18 20 17.55 20 17V16H14C12.9 16 12 15.1 12 14V11C12 9.9 12.9 9 14 9H21V6C21 4.9 20.1 4 19 4H6V5H19C19.55 5 20 5.45 20 6V9H14C12.9 9 12 9.9 12 11V14C12 15.1 12.9 16 14 16H21V18M14 11V14H21V11H14Z" />
        </svg>
        Conectar Carteira
    </button>

    <div id="errorMsg" class="error-msg"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script>
    console.log("Login script loaded");

    document.addEventListener('DOMContentLoaded', () => {
        console.log("DOM loaded");
        const btn = document.getElementById('btnLogin');
        if (btn) {
            btn.addEventListener('click', loginWithWallet);
            console.log("Click listener added to button");
        } else {
            console.error("Button btnLogin not found");
        }
    });

    async function loginWithWallet() {
        console.log("loginWithWallet called");
        const btn = document.getElementById('btnLogin');
        const errorDiv = document.getElementById('errorMsg');
        
        // Reset state
        errorDiv.style.display = 'none';
        btn.disabled = true;
        btn.innerHTML = 'Conectando...';

        try {
            if (typeof ethers === 'undefined') {
                throw new Error("Biblioteca Ethers.js não carregada. Verifique sua conexão.");
            }

            if (!window.ethereum) {
                throw new Error("Carteira não encontrada. Instale o MetaMask.");
            }

            // Tentar conectar com Web3Provider
            const provider = new ethers.providers.Web3Provider(window.ethereum, "any");
            
            // 1. Request Accounts
            btn.innerHTML = 'Solicitando Acesso...';
            console.log("Requesting accounts...");
            const accounts = await provider.send("eth_requestAccounts", []);
            console.log("Accounts:", accounts);
            
            if (!accounts || accounts.length === 0) throw new Error("Nenhuma conta selecionada.");
            
            const signer = provider.getSigner();
            const address = await signer.getAddress();
            console.log("Address:", address);

            // 2. Sign Message
            // Message format: "Login to Genesis Miner Admin\nTimestamp: <timestamp>"
            const timestamp = Date.now();
            const message = `Login to Genesis Miner Admin\nTimestamp: ${timestamp}`;
            
            btn.innerHTML = 'Assinando...';
            console.log("Signing message...");
            const signature = await signer.signMessage(message);
            console.log("Signature:", signature);

            // 3. Send to Backend
            btn.innerHTML = 'Verificando...';
            
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address, signature, timestamp })
            });

            const data = await response.json();
            console.log("Backend response:", data);

            if (response.ok) {
                window.location.href = '/';
            } else {
                throw new Error(data.error || "Falha na autenticação");
            }

        } catch (err) {
            console.error("Login Error:", err);
            let msg = err.message || "Erro desconhecido";
            
            // Mensagens amigáveis para erros comuns
            if (msg.includes("user rejected")) msg = "Login cancelado pelo usuário.";
            if (msg.includes("Carteira não encontrada")) msg = "MetaMask não detectado.";
            if (msg.includes("Failed to fetch")) msg = "Erro de conexão com o servidor.";

            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = `
                <svg class="icon-wallet" viewBox="0 0 24 24">
                    <path d="M21 18V19C21 20.1 20.1 21 19 21H5C3.89 21 3 20.1 3 19V5C3 3.9 2.1 3 1 3H0V1H1C3.21 1 5 2.79 5 5V18H19C19.55 18 20 17.55 20 17V16H14C12.9 16 12 15.1 12 14V11C12 9.9 12.9 9 14 9H21V6C21 4.9 20.1 4 19 4H6V5H19C19.55 5 20 5.45 20 6V9H14C12.9 9 12 9.9 12 11V14C12 15.1 12.9 16 14 16H21V18M14 11V14H21V11H14Z" />
                </svg>
                Tentar Novamente
            `;
        }
    }
</script>

</body>
</html>
