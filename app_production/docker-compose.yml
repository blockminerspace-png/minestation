name: app_production

services:
  postgres:
    container_name: postgres_app
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-minestation}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-minestation}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    container_name: redis_app
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mongodb:
    container_name: mongodb_app
    image: mongo:7
    restart: always
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  app:
    container_name: app
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres_app:5432/${POSTGRES_DB:-minestation}
      REDIS_URL: redis://redis_app:6379
      MONGODB_URI: mongodb://mongodb_app:27017/genesis_logs
      PORT: 3000
      MINING_PROGRESS_REQUIRE_REDIS_LOCK: "1"
    env_file:
      - .env
    volumes:
      - ../backups:/app/backups
      - ../backend/img/uploads:/app/backend/img/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  app_worker:
    container_name: app_worker
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    command: ["node", "dist/workers/bullGenesisWorker.js"]
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis_app:6379
      MONGODB_URI: mongodb://mongodb_app:27017/genesis_logs
      GENESIS_BULL_QUEUE: ${GENESIS_BULL_QUEUE:-genesis-maintenance}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  app_nginx:
    container_name: app_nginx
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app

  app_certbot:
    container_name: app_certbot
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
    external: true
    name: deployment_pgdata
  redisdata:
    external: true
    name: deployment_redisdata
  mongodata:
    external: true
    name: deployment_mongodata
