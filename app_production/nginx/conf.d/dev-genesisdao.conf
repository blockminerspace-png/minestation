# Host de desenvolvimento / admin: sempre proxy para a app (sem página de manutenção).
# Ative o DNS `dev.genesisdao.tech` → mesmo servidor e descomente o bloco `listen 443` quando tiver certificado.
#
# Restrição por IP (opcional): descomente `allow` / `deny` e ajuste o seu IP.

server {
    listen 80;
    listen [::]:80;
    server_name dev.genesisdao.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /etc/nginx/conf.d/sensitive-deny.inc;

    client_max_body_size 32m;

    # allow 203.0.113.50;
    # deny all;

    resolver 127.0.0.11 ipv6=off valid=30s;
    set $app_upstream http://app:3000;

    location ^~ /ws/ {
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
