# Este vhost não inclui snippets/cloudflare-allow.inc (allowlist de IPs Cloudflare).
# Só deves usar esse include na origem se o DNS estiver sempre “laranja” e aceitares
# que testes directos ao IP / bypass da Cloudflare falhem. Se o site ficou inacessível,
# remove qualquer `include ... cloudflare-allow.inc` que tenhas colocado aqui ou no nginx.conf.

server {
    listen 80;
    listen [::]:80;
    server_name genesisdao.tech www.genesisdao.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /etc/nginx/conf.d/sensitive-deny.inc;

    location / {
        return 301 https://genesisdao.tech$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name dev.genesisdao.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /etc/nginx/conf.d/sensitive-deny.inc;

    location / {
        return 301 https://dev.genesisdao.tech$request_uri;
    }
}

