server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name genesisdao.tech www.genesisdao.tech;
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $app_upstream http://app:3000;

    ssl_certificate /etc/letsencrypt/live/genesisdao.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/genesisdao.tech/privkey.pem;

    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    include /etc/nginx/conf.d/sensitive-deny.inc;

    location ^~ /ws/ {
        limit_req zone=perip burst=200 nodelay;
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Suporte: multipart com vários anexos (multer até ~60MB); predefinição nginx 1m → 413.
    location ^~ /api/support/ {
        client_max_body_size 70m;
        limit_req zone=perip burst=200 nodelay;
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/admin/support-tickets/ {
        client_max_body_size 70m;
        limit_req zone=perip burst=200 nodelay;
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # P2P mercado: transação com FOR UPDATE (listing + game_states); pode exceder 120s sob pico.
    location ^~ /api/market/ {
        limit_req zone=perip burst=200 nodelay;
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Abrir caixas: transação com FOR UPDATE + possíveis bundles; evitar 504 aos 120s.
    location ^~ /api/lucky-boxes/ {
        limit_req zone=perip burst=200 nodelay;
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=perip burst=200 nodelay;
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

