<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manutenção — Genesis DAO</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 55%, #020617 100%);
      color: #e2e8f0;
    }
    .box {
      max-width: 32rem; padding: 2rem 2.25rem; border-radius: 1rem;
      border: 1px solid rgba(245, 158, 11, 0.35);
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 0 40px rgba(245, 158, 11, 0.08);
      text-align: center;
    }
    h1 { font-size: 1.35rem; margin: 0 0 0.75rem; color: #fbbf24; letter-spacing: 0.04em; }
    p { margin: 0; line-height: 1.55; font-size: 0.95rem; color: #94a3b8; }
    .sub { margin-top: 1.25rem; font-size: 0.8rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Manutenção programada</h1>
    <p>O site está temporariamente indisponível. Voltamos em breve.</p>
    <p class="sub">Se precisar de acesso administrativo urgente, utilize o host de desenvolvimento configurado pela equipa (sem esta página de manutenção).</p>
  </div>
</body>
</html>
