services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: minestation
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minestation"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
      # Sempre o serviço `db` na rede do compose. Não use DATABASE_URL do .env com localhost aqui —
      # dentro do container localhost não é o Postgres.
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/minestation
    env_file:
      - path: .env
        required: false
    volumes:
      # Persiste backups entre rebuilds da imagem (painel admin lista ficheiros nesta pasta).
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
